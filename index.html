<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Clone</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="brand"><i class="fas fa-shield-alt"></i> UnlockGen</div>
            <div class="actions">
                <i class="fas fa-moon"></i>
                <i class="fas fa-paper-plane"></i>
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-box">
            <input type="text" placeholder="Search...">
            <i class="fas fa-search"></i>
        </div>

        <!-- Banner -->
        <div class="banner">
            <i class="fas fa-bullhorn"></i> প্রিমিয়ার অ্যাপস একদম ফ্রিতে পেতে, আমাদের টেলিগ্রাম চ্যানেলে জয়েন করুন!
        </div>

        <!-- Trending Section -->
        <div class="section-header">
            <h3><i class="fas fa-chart-line"></i> Trending Apps <span>(10)</span></h3>
        </div>
        <div id="trending-apps" class="app-grid"></div>

        <!-- Latest Updates Section -->
        <div class="section-header mt-4">
            <h3><i class="fas fa-layer-group"></i> Latest Updates <span>(21)</span></h3>
        </div>
        <div id="latest-apps" class="app-grid"></div>

        <!-- Bottom Menu -->
        <div class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-home"></i> Home</div>
            <div class="nav-item"><i class="fas fa-th-large"></i> Apps</div>
            <div class="nav-item"><i class="fas fa-palette"></i> Preset</div>
            <div class="nav-item"><i class="fas fa-robot"></i> AI Prompt</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
