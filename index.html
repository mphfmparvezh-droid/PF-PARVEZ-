<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PF PARVEZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  
  <script>
    tailwind.config = {
      content: [],
      theme: {
        extend: {}
      }
    }
  </script>
</head>

<body class="bg-zinc-950 text-white min-h-screen pb-20">

  <!-- Header -->
  <header class="bg-zinc-900 py-4 border-b border-zinc-800">
    <div class="max-w-4xl mx-auto px-4">
      <h1 class="text-3xl font-bold text-cyan-400 text-center">PF PARVEZ</h1>
    </div>
  </header>

  <!-- Search -->
  <div class="max-w-4xl mx-auto px-4 mt-6">
    <input 
      type="text" 
      placeholder="Search Apps..." 
      class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-cyan-500">
  </div>

  <!-- Welcome Banner -->
  <div class="max-w-4xl mx-auto px-4 mt-6">
    <div class="bg-gradient-to-r from-cyan-500 to-blue-600 rounded-3xl p-8 text-center">
      <h2 class="text-3xl font-bold mb-2">Welcome</h2>
      <p class="text-lg opacity-90">Premium Apps • AI Prompts • Presets</p>
    </div>
  </div>

  <!-- Grid -->
  <div class="max-w-4xl mx-auto px-4 mt-8">
    <div class="grid grid-cols-2 gap-4">
      
      <div class="card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 hover:border-cyan-500 transition-all">
        <div class="h-24 bg-zinc-800 flex items-center justify-center">
          <img src="https://via.placeholder.com/100" class="w-16 h-16" alt="">
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-xl">Apps</h3>
          <p class="text-zinc-400 text-sm">Latest Apps</p>
          <button class="mt-4 w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold py-3 rounded-2xl transition">
            Open
          </button>
        </div>
      </div>

      <div class="card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 hover:border-cyan-500 transition-all">
        <div class="h-24 bg-zinc-800 flex items-center justify-center">
          <img src="https://via.placeholder.com/100" class="w-16 h-16" alt="">
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-xl">AI Prompt</h3>
          <p class="text-zinc-400 text-sm">Premium Prompt</p>
          <button class="mt-4 w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold py-3 rounded-2xl transition">
            Open
          </button>
        </div>
      </div>

      <!-- আরও দুটা কার্ড একইভাবে যোগ করো -->

    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-700 py-3">
    <div class="max-w-4xl mx-auto flex justify-around text-xs">
      <a href="#" class="flex flex-col items-center text-cyan-400">
        <span class="text-2xl">🏠</span>
        <span>Home</span>
      </a>
      <a href="#" class="flex flex-col items-center">
        <span class="text-2xl">📱</span>
        <span>Apps</span>
      </a>
      <a href="#" class="flex flex-col items-center">
        <span class="text-2xl">✍️</span>
        <span>Prompt</span>
      </a>
      <a href="#" class="flex flex-col items-center">
        <span class="text-2xl">🎨</span>
        <span>Preset</span>
      </a>
      <a href="#" class="flex flex-col items-center">
        <span class="text-2xl">📚</span>
        <span>Menu</span>
      </a>
    </div>
  </div>

</body>
</html>
